[build]
  command = "npm run build"
  publish = "."

[functions]
  directory = "api"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200
  force = true

[[redirects]]
  from = "/api/lyrics"
  to = "/.netlify/functions/lyrics"
  status = 200
  force = true

[[redirects]]
  from = "/api/artist"
  to = "/.netlify/functions/artist"
  status = 200
  force = true

[[redirects]]
  from = "/api/suggest"
  to = "/.netlify/functions/suggest"
  status = 200
  force = true

[[redirects]]
  from = "/api/stream"
  to = "/.netlify/functions/stream"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200